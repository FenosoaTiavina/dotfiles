# See https://wiki.hyprland.org/Configuring/Window-Rules/

windowrule {
  name = windowrule-1
  opaque = on
  match:class = (.)
}


windowrule {
  name = windowrule-5
  float = on
  match:class = ^(zen)$
  match:title = ^(Picture-in-Picture)$
}

windowrule {
  name = windowrule-6
  float = on
  match:class = ^(zen)$
  match:title = ^(Library)$
}

windowrule {
  name = windowrule-7
  float = on
  match:class = ^(com.mitchellh.ghostty)$
  match:title = ^(top)$
}

windowrule {
  name = windowrule-8
  float = on
  match:class = ^(com.mitchellh.ghostty)$
  match:title = ^(btop)$
}

windowrule {
  name = windowrule-9
  float = on
  match:class = ^(com.mitchellh.ghostty)$
  match:title = ^(htop)$
}

windowrule {
  name = windowrule-10
  float = on
  match:class = ^(vlc)$
}

windowrule {
  name = windowrule-12
  float = on
  match:class = ^(qt5ct)$
}

windowrule {
  name = windowrule-13
  float = on
  match:class = ^(qt6ct)$
}

windowrule {
  name = windowrule-14
  float = on
  match:class = ^(nwg-look)$
}

windowrule {
  name = windowrule-15
  float = on
  match:class = ^(org.kde.ark)$
}

windowrule {
  name = windowrule-16
  float = on
  match:class = ^(org.pulseaudio.pavucontrol)$
}

windowrule {
  name = windowrule-17
  float = on
  match:class = ^(blueman-manager)$
}

windowrule {
  name = windowrule-18
  float = on
  match:class = ^(nm-applet)$
}

windowrule {
  name = windowrule-19
  float = on
  match:class = ^(nm-connection-editor)$
}

windowrule {
  name = windowrule-20
  float = on
  match:class = ^(org.kde.polkit-kde-authentication-agent-1)$
}

# waydroid
windowrule {
    name = windowrule-1
    tag = +waydroid
    match:class = ^(.*[Ww]aydroid)
}

windowrule {
    name = windowrule-2
    tag = +waydroid
    match:class = ^(.*[Ww]lroots).*
}

windowrule {
    name = windowrule-3
    tag = +wayhelper
    match:class = ^(.*WaydroidHelper\.KeyMapper.*)
}

# Rule for any Waydroid window
windowrule {
    name = windowrule-4
    # border_size = 1
    workspace = emptym
    match:tag = waydroid*
}

# Rules for the Keymapper overlay
windowrule {
    name = keymap_rule
    border_size = 1
    workspace = emptym
    match:tag = wayhelper*
}

# common modals
windowrule {
  name = windowrule-31
  float = on
  match:title = ^(Open)$
}

windowrule {
  name = windowrule-32
  float = on
  match:title = ^(Choose Files)$
}

windowrule {
  name = windowrule-33
  float = on
  match:title = ^(Save As)$
}

windowrule {
  name = windowrule-34
  float = on
  match:title = ^(Confirm to replace files)$
}

windowrule {
  name = windowrule-35
  float = on
  match:title = ^(File Operation Progress)$
}

windowrule {
  name = windowrule-36
  float = on
  match:class = ^(xdg-desktop-portal-gtk)$
}




